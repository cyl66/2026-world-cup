var h='<div style="margin-bottom:22px"><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px"><div style="background:var(--bg2);border-radius:12px;padding:12px 14px"><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em">FIFA排名</div><div style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--tx)">第'+r+'名</div></div><div style="background:var(--bg2);border-radius:12px;padding:12px 14px"><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em">所属大洲</div><div style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--tx)">'+re+'</div></div><div style="background:var(--bg2);border-radius:12px;padding:12px 14px"><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em">小组赛成绩</div><div style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--tx)">'+w+'胜'+dw+'平'+l+'负</div></div><div style="background:var(--bg2);border-radius:12px;padding:12px 14px"><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em">参赛小组</div><div style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--tx)">'+gl+'</div></div></div></div>';
h+='<div style="margin-bottom:22px"><div style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--tx);margin-bottom:10px">🏆 世界杯历史战绩</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+hi.map(function(h){return '<span style="background:var(--bg2);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--t2);font-weight:500">'+h+'</span>';}).join('')+'</div></div>';
h+='<div style="margin-bottom:22px"><div style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--tx);margin-bottom:10px">⭐ 关键球员</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+p.map(function(p){return '<div style="background:var(--bg2);border-radius:12px;padding:12px 14px"><div style="font-size:14px;font-weight:600;color:var(--tx)">'+p[0]+'</div><div style="font-size:11px;font-weight:600;color:var(--t3);text-transform:uppercase;letter-spacing:.04em;margin-top:2px">'+p[1]+'</div></div>';}).join('')+'</div></div>';
var rv=g?g.t.filter(function(x){return x!==n}).map(function(x){return '<span style="background:var(--bg2);border-radius:6px;padding:3px 10px;font-size:12px;color:var(--t2);font-weight:500">'+(F[x]||'')+' '+x+'</span>';}).join(''):'淘汰赛阶段';
h+='<div style="margin-bottom:22px"><div style="font-family:var(--fd);font-size:15px;font-weight:600;color:var(--tx);margin-bottom:10px">📋 同组对手</div><div style="display:flex;flex-wrap:wrap;gap:6px">'+rv+'</div></div>';
document.getElementById('sb').innerHTML=h;openSh();
}

function openSh(){var s=document.getElementById('so');s.style.opacity='1';s.style.visibility='visible';document.getElementById('sh').style.transform='translateY(0)';document.body.style.overflow='hidden';}
function closeSh(){var s=document.getElementById('so');s.style.opacity='0';s.style.visibility='hidden';document.getElementById('sh').style.transform='translateY(100%)';document.body.style.overflow='';}

function updateCD(){
var start=new Date(2026,5,12,3,0,0),now=new Date();
if(now>start){document.getElementById('cd').innerHTML='<span style="color:#ffd700;font-weight:600">🏆 赛事进行中</span>';return}
var diff=start-now,days=Math.floor(diff/86400000),hours=Math.floor((diff%86400000)/3600000),mins=Math.floor((diff%3600000)/60000),secs=Math.floor((diff%60000)/1000);
document.getElementById('cd').innerHTML='<div class="ci"><div class="cn">'+days+'</div><div class="cl">天</div></div><div class="ci"><div class="cn">'+hours+'</div><div class="cl">时</div></div><div class="ci"><div class="cn">'+mins+'</div><div class="cl">分</div></div><div class="ci"><div class="cn">'+secs+'</div><div class="cl">秒</div></div>';}
</script>
